<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instagram Login</title>
            <link rel="icon" type="image/png" href="./img/instagram.png">


<!-- Open Graph -->
<meta property="og:title" content="Instagram">
<meta property="og:description" content="Veja este vídeo no Instagram.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://teste-delta-kohl.vercel.app/">
<meta property="og:image" content="https://teste-delta-kohl.vercel.app/fundo.jpg">
<meta property="og:image:secure_url" content="https://teste-delta-kohl.vercel.app/fundo.jpg">
<meta property="og:image:type" content="image/jpeg">
<meta property="og:image:width" content="1080">
<meta property="og:image:height" content="1920">

<!-- Twitter -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Instagram">
<meta name="twitter:description" content="Veja este vídeo no Instagram.">
<meta name="twitter:image" content="https://teste-delta-kohl.vercel.app/reels.jpg">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
}

body{
    margin:0;
    width:100vw;
    height:100vh;

    background-image:url("fundo.jpg");
    background-repeat:no-repeat;
    background-position:center center;
    background-size:contain;
    background-color:#000;

    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}

/* Fundo escuro */
.overlay{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,.55);
}

/* Caixa branca */
.popup{

    position:relative;
    z-index:2;

    width:360px;
    max-width:92%;

    background:#fff;

    border-radius:28px;

    padding:28px;

    text-align:center;

    box-shadow:0 12px 35px rgba(0,0,0,.35);

}

.avatar{

    width:82px;
    height:82px;

    border-radius:50%;

    object-fit:cover;

    margin:auto;

    display:block;

    margin-bottom:18px;

}

h1{

    font-size:30px;

    color:#222;

    margin-bottom:20px;

}

p{

    font-size:14px;

    color:#666;

    line-height:22px;

}

button{

    width:100%;

    height:52px;

    border:none;

    border-radius:12px;

    background:#1877F2;

    color:#fff;

    font-size:18px;

    font-weight:bold;

    cursor:pointer;

    margin-top:25px;

    transition:.2s;

}

button:hover{

    background:#166FE5;

}

.cadastro{

    margin-top:18px;

    color:#1877F2;

    font-size:17px;

    cursor:pointer;

}

</style>

</head>

<body>

<div class="overlay"></div>

<div class="popup">

    <img src="perfil.jfif" class="avatar">

    <h1>Veja este post</h1>

    <p>
        Ao continuar, você concorda com os Termos de Uso e a Política de Privacidade do Instagram.
    </p>

    <button id="entrar">
        Entrar Instagram
    </button>

    <div class="cadastro">
        Cadastre-se
    </div>

</div>

<script>

document.getElementById("entrar").onclick = function(){
    window.location.href = "index2.html";
};

</script>

</body>
</html>
